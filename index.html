<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizador Didático de Árvore B+ (Ordem 4)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Visualizador Didático de Árvore B+ (Ordem 4)</h1>

  <!-- Área de controles: campo de texto e botões para cada operação da árvore -->
  <div class="controles">
    <label for="campo-chave">Chave:</label>
    <input type="number" id="campo-chave" placeholder="Digite um número">

    <button onclick="botaoCriar()">Criar</button>
    <button onclick="botaoInserir()">Inserir</button>
    <button onclick="botaoBuscar()">Buscar</button>
    <button onclick="botaoRemover()">Remover</button>
    <button onclick="botaoImprimir()">Imprimir</button>
    <button onclick="botaoDestruir()">Destruir</button>
    <button id="botao-demo" onclick="rodarDemonstracao()">▶ Demonstração automática</button>
  </div>

  <!-- Área onde as mensagens de resultado de cada operação são exibidas -->
  <h2>Mensagens</h2>
  <div id="area-mensagens">Clique em "Criar" para começar.</div>

  <!-- Área onde a árvore é desenhada, nível por nível, usando apenas divs -->
  <h2>Árvore (organizada por níveis)</h2>
  <div id="area-arvore"></div>

  <script src="script.js"></script>
</body>
</html>
